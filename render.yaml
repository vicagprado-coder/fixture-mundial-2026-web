services:
  - type: web
    name: fixture-mundial-2026
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --workers 1 --threads 8 --timeout 180
    envVars:
      - key: FIXTURE_DATA_DIR
        value: /tmp/fixture_mundial_2026
      - key: APP_LOGIN_USER
        value: vglasinovich
      - key: APP_LOGIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TABLE
        value: app_state
      - key: APP_STATE_KEY
        value: fixture_mundial_2026
